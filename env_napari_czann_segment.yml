# run: conda env create --file env_napari_czann_segment.yml
#
# EXAMPLE conda environment for GPU-accelerated inference with napari-czann-segment.
# Adapt versions as needed for your system. This is NOT required for CPU-only usage.
#
# For CPU-only usage, simply: pip install napari-czann-segment
# The plugin automatically falls back to CPU if no GPU is detected.
#
# For GPU usage, this YAML installs onnxruntime-gpu with matching CUDA 12.4 + cuDNN 9
# libraries via conda. Adjust the CUDA version if your GPU driver requires a different one.
#
name: napari_czann_segment
channels:
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip
  - wheel
  - setuptools

  # CUDA runtime libraries - pinned to 12.4.x for onnxruntime-gpu compatibility
  # onnxruntime-gpu requires CUDA 12.x and cuDNN 9.x
  - nvidia::cuda-cudart=12.4
  - nvidia::libcublas=12.4
  - nvidia::cudnn=9.*

  - pip:
      # Install the plugin with GPU support
      - napari-czann-segment[gpu]
      # napari and Qt backend
      - napari[all]>=0.7.0
      # optional napari plugins
      - napari-brightness-contrast
      - napari-layer-details-display

# Create an environment:
#   conda env create --file env_napari_czann_segment.yml
#
# Update an environment:
#   conda env update --name napari_czann_segment --file env_napari_czann_segment.yml --prune
#
# Remove an environment:
#   conda remove --name napari_czann_segment --all
#
# Verify GPU support after installation:
#   python -c "import onnxruntime; print(onnxruntime.get_available_providers())"
#   # Should show: ['TensorrtExecutionProvider', 'CUDAExecutionProvider', 'CPUExecutionProvider']
