# For more information about tox, see https://tox.readthedocs.io/en/latest/
[tox]
envlist = py{311,312,313}-{linux,windows,macos}

isolated_build=true

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313

[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    windows-latest: windows
    macos-latest: macos

[testenv]
platform =
    linux: linux
    windows: win32
passenv =
    CI
    GITHUB_ACTIONS
    DISPLAY
    XAUTHORITY
    NUMPY_EXPERIMENTAL_ARRAY_FUNCTION
    PYVISTA_OFF_SCREEN
extras =
    testing
commands = pytest -v --color=yes --cov=napari_czann_segment --cov-report=xml
